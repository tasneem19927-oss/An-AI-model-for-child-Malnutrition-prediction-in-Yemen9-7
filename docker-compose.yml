version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: malnutrition-postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_secure_pass_123}
      POSTGRES_DB: malnutrition_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d malnutrition_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: malnutrition-fastapi-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres_secure_pass_123}@db:5432/malnutrition_db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: malnutrition-express-frontend
    restart: always
    depends_on:
      - backend
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BACKEND_API_URL=http://backend:8000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
